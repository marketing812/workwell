h=device-width, initial-scale=1\"}]]\nf:null\n"])</script><script>self.__next_f.push([1,"18:I[80622,[],\"IconMark\"]\n11:{\"metadata\":[[\"$\",\"link\",\"0\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"16x16\"}],[\"$\",\"$L18\",\"1\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"16:\"$11:metadata\"\n"])</script><script>self.__next_f.push([1,"19:T1358,"])</script><script>self.__next_f.push([1,"\n\u003cp\u003e\u003cem\u003eNos distraemos para no sentir… pero lo que evitamos sigue ahí\u003c/em\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eVivimos hiperconectados,\u0026nbsp;pero emocionalmente ausentes\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003ePuede que estés leyendo esto tras una hora de\u0026nbsp;scroll\u0026nbsp;en Instagram\u0026nbsp;o\u0026nbsp;después de contestar 27 mensajes sin mirar realmente a nadie.\u0026nbsp;Y\u0026nbsp;quizá ahora mismo, una parte de ti sienta cansancio,\u0026nbsp;sin saber bien por qué.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eNo es solo fatiga mental, es\u0026nbsp;\u003cstrong\u003esobrecarga emocional\u003c/strong\u003e\u0026nbsp;disfrazada de\u0026nbsp;hiperconexión\u0026nbsp;digital.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;¿Qué está pasando?\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eLa ciencia lo explica. Nuestros dispositivos nos mantienen en un\u0026nbsp;\u003cstrong\u003eestado de estimulación constante\u003c/strong\u003e, alternando entre\u0026nbsp;microdosis\u0026nbsp;de dopamina (likes, notificaciones,\u0026nbsp;reels) y picos de ansiedad, conductas de\u0026nbsp;comparación o\u0026nbsp;sensación de\u0026nbsp;vacío.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eSegún un estudio de\u0026nbsp;Según\u0026nbsp;Twenge\u0026nbsp;y Campbell (2018),\u0026nbsp;el uso excesivo de pantallas se relaciona directamente con mayores niveles de soledad, insomnio y síntomas depresivos, especialmente en personas jóvenes y sensibles emocionalmente.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eLa\u0026nbsp;\u003cstrong\u003ehiperconectividad\u003c/strong\u003e\u0026nbsp;digital activa nuestro sistema de recompensa (dopamina), pero\u0026nbsp;\u003cstrong\u003eno satisface nuestras necesidades emocionales reales\u003c/strong\u003e: vinculación, calma, validación profunda. Como resultado,\u0026nbsp;cuanto más conectados estamos en lo superficial, más desconectados nos sentimos por dentro.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003e¿Qué ocurre a nivel cerebral?\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eEl cerebro busca placer rápido. Pero cuando el “premio” no viene acompañado de\u0026nbsp;\u003cstrong\u003esentido, vínculo o atención plena\u003c/strong\u003e, se genera un círculo adictivo:\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e“Más\u0026nbsp;scroll\u0026nbsp;= más dopamina → menos regulación emocional → más necesidad de estímulo → más ansiedad → más\u0026nbsp;scroll…”\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eAdemás, la\u0026nbsp;\u003cstrong\u003esobreexposición a estímulos visuales rápidos\u003c/strong\u003e, el multitasking y la falta de pausas reales inhiben la corteza prefrontal (responsable de la toma de decisiones, atención y regulación emocional), mientras\u0026nbsp;hiperactivan\u0026nbsp;el sistema límbico (amenaza, impulsividad, huida).\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eEl resultado:\u0026nbsp;agotamiento sin saber por qué. Incapacidad para concentrarse. Reacciones impulsivas. Insatisfacción.\u0026nbsp;Sensación de vacío.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003e¿Y emocionalmente?\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eMuchas veces no estamos enganchados al móvil,\u0026nbsp;sino\u0026nbsp;\u003cstrong\u003ehuyendo de nuestro mundo interno.\u0026nbsp;\u003c/strong\u003eLa psicología lo llama\u0026nbsp;\u003cem\u003eevitación experiencial\u003c/em\u003e: intentamos evitar pensamientos o emociones difíciles (como el miedo, el dolor o la incomodidad) sumergiéndonos en distracciones.\u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003ePero como señala\u0026nbsp;\u003cstrong\u003eHayes et al. (2012)\u003c/strong\u003e, cuanto más evitamos sentir,\u0026nbsp;\u003cstrong\u003emás se perpetúa el malestar\u003c/strong\u003e.\u0026nbsp;A corto plazo parece funcionar. A largo plazo…\u0026nbsp;\u003cstrong\u003enos deja más vacíos y desbordados.\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003e¿Qué podemos hacer?\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eDesde Emotiva proponemos\u0026nbsp;\u003cstrong\u003etres claves terapéuticas\u003c/strong\u003e\u0026nbsp;para romper este ciclo silencioso:\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"1\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eHaz pausas conscientes\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003eEl primer paso no es abandonar el móvil, sino\u0026nbsp;\u003cstrong\u003ecrear espacios de reconexión interna\u003c/strong\u003e. Aunque sea solo por 5 minutos: respira, escribe, observa cómo estás.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eEjercicio\u0026nbsp;express: 3-2-1:\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eNombra 3 emociones que sientes ahora. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003e2 cosas que tu cuerpo necesita y \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003e1 acción amable que puedes hacer hoy por ti. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003col start=\"2\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003ePon límites digitales emocionales, no solo horarios\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003eNo se trata de apagar el móvil 1 hora antes de dormir (que también ayuda), sino de\u0026nbsp;\u003cstrong\u003epreguntarte por qué lo usas\u003c/strong\u003e. ¿Estás cansado/a? ¿Ansioso/a? ¿Evadiendo algo?\u0026nbsp;Aprender a identificar tus necesidades reales es más potente que silenciar notificaciones.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"3\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eVuelve al contacto real (también contigo)\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003eNada reemplaza el poder de un abrazo, una mirada sostenida o una conversación honesta.\u0026nbsp;\u003cbr\u003eY si eso no es posible hoy…\u0026nbsp;\u003cstrong\u003ereconecta contigo.\u003c/strong\u003e\u0026nbsp;Con tu cuerpo, tu respiración, tu voz interior.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cem\u003eNo estás mal por sentirte saturado o solo\u0026nbsp;con tanta conexión.\u0026nbsp;El problema no\u0026nbsp;eres tú.\u0026nbsp;Es el modelo.\u0026nbsp;Y puedes elegir otra forma de estar en el mundo.\u003c/em\u003e\u0026nbsp;\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"d:[\"$\",\"div\",null,{\"className\":\"container mx-auto py-8 max-w-4xl\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"rounded-lg border bg-card text-card-foreground shadow-xl overflow-hidden\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"flex flex-col space-y-1.5 border-b p-0\",\"children\":[\"$undefined\",[\"$\",\"div\",null,{\"className\":\"p-6\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"tracking-tight text-3xl md:text-4xl font-bold text-primary\",\"dangerouslySetInnerHTML\":{\"__html\":\"PANTALLAS, DOPAMINA Y SOLEDAD: EL CICLO SILENCIOSO \"}}],[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"flex flex-wrap items-center text-sm text-muted-foreground pt-2 gap-x-4 gap-y-1\",\"children\":[\"$\",\"span\",null,{\"className\":\"flex items-ce
