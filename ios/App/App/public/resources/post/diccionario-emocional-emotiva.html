u003eTristeza\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Una reacción natural ante pérdidas, decepciones o situaciones que duelen.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Te invita a parar, cuidarte y pedir apoyo.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Puedes perder energía, aislarte o desconectarte de tus rutinas.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"3\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003e Miedo\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;La sensación de que algo podría ponerte en peligro.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Te ayuda a protegerte y a tomar decisiones prudentes.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Puedes evitar situaciones seguras o limitar tu vida más de lo necesario.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"4\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eIra\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Activación intensa cuando sientes que algo es injusto, invasivo o dañino.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Te ayuda a poner límites y defenderte.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Puedes reaccionar impulsivamente y dañar relaciones importantes.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"5\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eAsco\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Rechazo fuerte hacia algo que percibes como sucio, peligroso o inapropiado.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Te protege de riesgos físicos o morales.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Puede volverse rigidez o rechazo exagerado.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"6\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eSorpresa\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Reacción inmediata ante algo inesperado.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Te hace prestar atención y adaptarte rápido.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Puede convertirse en alerta continua.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"7\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eDesprecio\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Sensación de superioridad o rechazo hacia algo o alguien.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;A veces ayuda a marcar distancia con comportamientos que consideras inaceptables.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Afecta la convivencia y deteriora vínculos.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"8\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eRabia\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Una forma muy intensa de ira que domina la conducta.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Puede impulsar defensa inmediata ante daño extremo.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Te lleva a actuar sin pensar y a generar rupturas relacionales.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eFAMILIA 2:\u0026nbsp;Regulación Emocional y Estados Corporales\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"9\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eEstrés\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Sensación de presión cuando sientes que tienes más demandas que recursos.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Activa tu energía para resolver situaciones importantes.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Te agota, afecta la concentración y puede impactar en tu salud.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"10\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eAnsiedad\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Sensación de alerta cuando imaginas que algo malo podría pasar.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Te prepara para actuar y anticiparte.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Te bloquea, agota y te lleva a evitar situaciones que necesitas afrontar.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"11\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eAgobio\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Sentir que todo ocurre a la vez y no puedes con todo.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Te indica que necesitas frenar y reorganizarte.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Te desborda y dificulta tomar decisiones.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"12\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eAlarma\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Activación súbita ante una posible amenaza.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Reaccionas con rapidez para protegerte.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Puedes vivir en estado de tensión continua.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"13\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eVigilancia / Alerta sostenida\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Estar pendiente continuamente de lo que podría salir mal.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Es útil en entornos inciertos.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Genera cansancio y mantiene la ansiedad.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"14\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eTensión\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Rigidez o presión interna causada por preocupación o esfuerzo prolongado.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Indica que hay algo que te está exigiendo demasiado.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Afecta al sueño, a los músculos y a tu bienestar diario.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"15\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eSerenidad\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Sentir equilibrio, claridad y calma.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Facilita ver las cosas con perspectiva y tomar decisiones estables.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Puede confundirse con evitar conflictos o emociones incómodas.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"16\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eAceptación\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Reconocer una situación tal como es, sin lucha interna.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Reduce sufrimiento y ayuda a adaptarte.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Puedes confundirla con resignación y dejar de defender tus necesidades.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"17\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eAlivio\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Descenso de tensión cuando un malestar disminuye o desaparece.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué sirve:\u003c/strong\u003e\u0026nbsp;Permite descansar y recuperar energía.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003eSi se mantiene demasiado:\u003c/strong\u003e\u0026nbsp;Puede reforzar la evitación de situaciones necesarias.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"18\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eCalma\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eQué es:\u003c/strong\u003e\u0026nbsp;Sensación de tranquilidad y bajo nivel de activación.\u0026nbsp;\u003cbr\u003e\u003cstrong\u003ePara qué
