\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nf:null\n"])</script><script>self.__next_f.push([1,"18:I[80622,[],\"IconMark\"]\n11:{\"metadata\":[[\"$\",\"link\",\"0\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"16x16\"}],[\"$\",\"$L18\",\"1\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"16:\"$11:metadata\"\n"])</script><script>self.__next_f.push([1,"19:T130e,"])</script><script>self.__next_f.push([1,"\n\u003cp\u003e\u003cem\u003eAutoexigencia, perfeccionismo y desconexión emocional: las cicatrices invisibles del cansancio que no se nota, pero pesa\u003c/em\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eA veces,\u0026nbsp;no es tristeza, ni apatía, ni depresión. Es\u0026nbsp;\u003cstrong\u003efatiga emocional acumulada\u003c/strong\u003e. Es ese tipo de cansancio profundo que aparece cuando has sostenido demasiado sin darte el permiso de soltar. Cuando has sido fuerte por fuera\u0026#8230;,\u0026nbsp;pero te has ido desgastando por dentro.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eY no, no es\u0026nbsp;desidia, ni falta de actitud. Es el resultado de vivir en\u0026nbsp;\u003cstrong\u003emodo alerta\u003c/strong\u003e, de\u0026nbsp;invertir mucho esfuerzo y obtener poco a cambio.\u0026nbsp;De exigirte incluso cuando no puedes más. Si te suena familiar, esto también es para ti.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eLa fatiga emocional no es debilidad. Es saturación\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eEs un estado de agotamiento físico y mental producido por el esfuerzo prolongado de sostener emociones intensas: las propias\u0026nbsp;o las de los demás. Escuchar, cuidar, contener\u0026nbsp;y\u0026nbsp;resolver\u0026nbsp;día tras día. Esa sobrecarga silenciosa, muchas veces invisible, puede llevar al cuerpo y al cerebro a funcionar en\u0026nbsp;\u003cstrong\u003emodo supervivencia\u003c/strong\u003e. Se activa el sistema límbico (emoción), y la corteza prefrontal (razón) se agota. El resultado: irritabilidad, desconexión, confusión mental, hipersensibilidad… o bloqueo.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eEn estudios recientes sobre\u0026nbsp;\u003cstrong\u003eburnout emocional\u003c/strong\u003e\u0026nbsp;(Figley, 2002; Maslach \u0026amp; Leiter, 2016), se ha demostrado que el impacto del estrés empático sostenido puede ser tan debilitante como el estrés físico crónico. Es lo que también se conoce como\u0026nbsp;\u003cstrong\u003efatiga por compasión\u003c/strong\u003e.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003e¿Y si no es que no puedes más… sino que llevas demasiado solo/a?\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eMuchos de estos patrones no nacen de la nada. Se forman con el tiempo, con historias personales que enseñaron que\u0026nbsp;\u003cem\u003eser valiente\u003c/em\u003e\u0026nbsp;es no pedir ayuda, que\u0026nbsp;\u003cem\u003eser responsable\u003c/em\u003e\u0026nbsp;es no fallar\u0026nbsp;y\u0026nbsp;que\u0026nbsp;\u003cem\u003eser buena persona\u003c/em\u003e\u0026nbsp;es no poner límites. Y así, muchas personas terminan atrapadas en un ciclo de\u0026nbsp;\u003cstrong\u003eautoexigencia crónica\u003c/strong\u003e, sin margen para la\u0026nbsp;compasión\u0026nbsp;hacia sí mismas.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eQuienes viven con estos niveles de exigencia suelen tener pensamientos como:\u0026nbsp;\u003cbr\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003e“Todo depende de mí” \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003e“No puedo equivocarme” \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003e“Si no lo hago perfecto, no es válido” \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cp\u003eEste estilo de pensamiento activa de forma constante el sistema de estrés, genera una vigilancia permanente, disminuye el descanso y\u0026nbsp;debilita la\u0026nbsp;autoestima\u0026nbsp;(Beck, 2005; Young et al., 2003).\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eEl perfeccionismo no te protege: te drena\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eContrario a lo que muchas veces creemos, el perfeccionismo\u0026nbsp;\u003cstrong\u003eno es una virtud elevada\u003c/strong\u003e, sino una forma de miedo muy bien disfrazada. Miedo al juicio, al error\u0026nbsp;o\u0026nbsp;a no ser suficiente.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eMantenerse en ese estado de evaluación constante, sin pausas ni refuerzos positivos, produce una tensión interna que a la larga se traduce en\u0026nbsp;\u003cstrong\u003eagotamiento psicológico\u003c/strong\u003e. Un tipo de malestar que impacta en la salud, las relaciones y la capacidad de disfrutar.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003e¿Y la desconexión emocional?\u0026nbsp;\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eCuando llevas mucho tiempo conteniendo el dolor, es habitual que empieces a\u0026nbsp;\u003cstrong\u003edesconectarte\u0026nbsp;\u003c/strong\u003ede lo que sientes. No porque no te importe, sino porque te ha dolido demasiado durante mucho tiempo. Es un mecanismo de\u0026nbsp;\u003cstrong\u003esupervivencia\u003c/strong\u003e: el cuerpo aprende a protegerse cerrando el acceso a las emociones que hieren. Pero, al hacerlo, también puede cerrar el paso a la ternura, al disfrute y al deseo.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eEsto se conoce como\u0026nbsp;\u003cstrong\u003edesconexión emocional funcional\u003c/strong\u003e: se evita el contacto con las sensaciones internas por miedo a lo que puedan despertar. Pero evitar lo que sentimos\u0026nbsp;\u003cstrong\u003eno lo elimina\u003c/strong\u003e: lo cronifica. A largo plazo, esta evitación está relacionada con mayor ansiedad, somatización y patrones de evitación interpersonal (Hayes et al., 1996; Linehan, 1993).\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eSi todo esto te suena… no estás sola, ni solo. No estás rota ni roto.\u0026nbsp;Solo estás\u0026nbsp;\u003cstrong\u003eagotado o agotada de aguantar tanto en silencio\u003c/strong\u003e. Y eso también merece compasión.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cem\u003eRevisar tu exigencia, recuperar tu\u0026nbsp;compasión\u0026nbsp;y darte el permiso de sentir, sin juicio,\u0026nbsp;\u003c/em\u003e\u003cstrong\u003e\u003cem\u003eno es rendirse\u003c/em\u003e\u003c/strong\u003e\u003cem\u003e.\u0026nbsp;Es el primer paso para cuidarte desde un lugar más sano, humano y sostenible.\u003c/em\u003e\u0026nbsp;\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"d:[\"$\",\"div\",null,{\"className\":\"container mx-auto py-8 max-w-4xl\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"rounded-lg border bg-card text-card-foreground shadow-xl overflow-hidden\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"flex flex-col space-y-1.5 border-b p-0\",\"children\":[\"$undefined\",[\"$\",\"div\",null,{\"className\":\"p-6\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"tracking-tight text-3xl md:text-4xl font-bold text-primary\",\"dangerouslySetInnerHTML\":{\"__html\":\"NO ESTÁS ROTO NI ROTA. SOLO CANSADO O CANSADA DE FINGIR QUE PUEDES CON TODO \"}}],[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"flex flex-wrap items-center text-sm text-muted-foreground pt-2 gap-x-4 gap-y-1\",\"children\":[\"$\",\"span\",null,{\"className\":\"flex items-center\",\"children\":[[\"$\",\"svg\",null,{\"ref\":\"$undefined\",\"xmlns\":\"http://www.w3.org/2000/svg\",\"width\":24,\"height\":24,\"viewBox\":\"0 0 24 24\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"strokeWidth\":2,\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"className\":\"lucide luci
