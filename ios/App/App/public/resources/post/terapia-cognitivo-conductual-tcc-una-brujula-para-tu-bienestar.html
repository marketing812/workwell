,{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nf:null\n"])</script><script>self.__next_f.push([1,"18:I[80622,[],\"IconMark\"]\n11:{\"metadata\":[[\"$\",\"link\",\"0\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"16x16\"}],[\"$\",\"$L18\",\"1\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"16:\"$11:metadata\"\n"])</script><script>self.__next_f.push([1,"19:T1372,"])</script><script>self.__next_f.push([1,"\n\u003cp\u003e\u003cem\u003ePorque lo que piensas influye en lo que sientes… y lo que sientes guía lo que haces\u003c/em\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eLa\u0026nbsp;\u003cstrong\u003eTerapia Cognitivo-Conductual (TCC)\u003c/strong\u003e\u0026nbsp;es uno de los enfoques psicológicos con mayor respaldo científico en el mundo.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eQuizás has escuchado esta metáfora antes; imagina que tu mente es como un par de gafas: si los cristales están rayados o distorsionados, verás\u0026nbsp;partes de\u0026nbsp;la realidad\u0026nbsp;borrosa. La TCC te ayuda a limpiar esas lentes para que veas con más claridad y decidas con más calma.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eNo es que pienses de forma incorrecta, sino que\u0026nbsp;cuando tu\u0026nbsp;mente está en modo automático, a veces, tiene pensamientos que interpretan la realidad de una forma\u0026nbsp;menos precisa e influida, en mayor intensidad, por la emoción del momento.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eLa TCC no busca que pienses de una forma específica, sino que entrenes a tu mente para mirar de una manera funcional y adaptativa.\u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003e¿Qué propone la TCC?\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eParte de una idea sencilla:\u0026nbsp;\u003cstrong\u003eTus pensamientos influyen en tus emociones, y estas influyen en tus acciones.\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eSi piensas \u003cem\u003e“voy a fracasar”\u003c/em\u003e, probablemente sientas ansiedad. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eSi piensas \u003cem\u003e“puedo intentarlo paso a paso”\u003c/em\u003e, sentirás más calma y motivación. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cp\u003eAaron Beck, uno de\u0026nbsp;los creadores de la terapia\u0026nbsp;cognitiva, descubrió que detrás de muchos problemas emocionales hay\u0026nbsp;\u003cstrong\u003epensamientos automáticos\u003c/strong\u003e: frases internas rápidas y casi invisibles que moldean cómo interpretas lo que ocurre.\u0026nbsp;Son ideas que aparecen de forma espontánea, sin que las elijas, todos las tenemos. A veces son útiles y te ayudan a orientarte, pero otras veces se activan desde patrones aprendidos y pueden llevarte a conclusiones duras o desproporcionadas. Por su velocidad y familiaridad, suelen sentirse como “hechos”, cuando en realidad son interpretaciones automáticas que tu mente genera para intentar darte sentido y protección.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eCómo funciona en la práctica\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eLa TCC combina reflexión y acción:\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"1\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eDetectar\u003c/strong\u003e los pensamientos automáticos que aparecen sin darte cuenta. \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003col start=\"2\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eCuestionarlos\u003c/strong\u003e con evidencias reales. \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003col start=\"3\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eSustituirlos\u003c/strong\u003e por interpretaciones más útiles y equilibradas. \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003col start=\"4\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003ePracticar nuevas conductas\u003c/strong\u003e que refuercen esos cambios. \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cp\u003eEs un proceso de aprendizaje: cuando entrenas nuevas formas de pensar y actuar, tu cerebro ajusta sus conexiones y fortalece patrones más útiles y flexibles.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eEl respaldo de la ciencia\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eLa TCC es\u0026nbsp;una de las\u0026nbsp;terapias\u0026nbsp;más investigadas\u0026nbsp;del mundo\u0026nbsp;y con mayor respaldo empírico:\u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eLa \u003cstrong\u003eAPA\u003c/strong\u003e (American Psychological Association) y la \u003cstrong\u003eOMS\u003c/strong\u003e la recomiendan como primera opción para ansiedad, depresión, fobias y estrés. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eEstudios de revisión (Butler et al., 2006; Hofmann et al., 2012) muestran su eficacia en cientos de ensayos clínicos. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eLa neurociencia confirma que con práctica se activa la \u003cstrong\u003ecorteza prefrontal\u003c/strong\u003e (autorregulación) y se reducen respuestas automáticas del sistema de amenaza (amígdala). \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003ePor qué funciona en tu día a día\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eLa TCC\u0026nbsp;propone ejercicios concretos, como escribir tus pensamientos, probar nuevas respuestas o aplicar técnicas de relajación.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eCada pequeño cambio genera\u0026nbsp;\u003cstrong\u003eexperiencias\u0026nbsp;nuevas\u003c/strong\u003e: esas vivencias que enseñan a tu mente que puedes actuar de otro modo y sentirte mejor.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eNo es teoría, es práctica: un camino para recuperar confianza y crear hábitos emocionales más sanos.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eLa\u0026nbsp;\u003cstrong\u003eTerapia Cognitivo-Conductual\u003c/strong\u003e\u0026nbsp;es una brújula basada en ciencia que te ayuda a orientarte cuando tus pensamientos te desvían.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eTe ofrece:\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eClaridad para entender lo que sientes. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eHerramientas para actuar de forma distinta. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eConfianza para transformar tu vida paso a paso. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cp\u003eEn EMOTIVA la hemos\u0026nbsp;elegido\u0026nbsp;como\u0026nbsp;base porque combina lo que más importa:\u0026nbsp;\u003cstrong\u003erigor científico, humanidad y resultados reales\u003c/strong\u003e.\u0026nbsp;\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"d:[\"$\",\"div\",null,{\"className\":\"container mx-auto py-8 max-w-4xl\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"rounded-lg border bg-card text-card-foreground shadow-xl overflow-hidden\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"flex flex-col space-y-1.5 border-b p-0\",\"children\":[\"$undefined\",[\"$\",\"div\",null,{\"className\":\"p-6\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"tracking-tight text-3xl md:text-4xl font-bold text-primary\",\"dangerouslySetInnerHTML\":{\"__html\":\"TERAPIA COGNITIVO-CONDUCTUAL (TCC): UNA BRÚJULA PARA TU BIENESTAR \"}}],[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"flex flex-wrap items-center text-sm text-muted-foreground pt-2 gap-x-4 gap-y-1\",\"children\":[\"$\",\"span\",null,{\"className\":\"fle
