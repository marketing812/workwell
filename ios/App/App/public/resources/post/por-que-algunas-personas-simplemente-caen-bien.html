ce-width, initial-scale=1\"}]]\nf:null\n"])</script><script>self.__next_f.push([1,"18:I[80622,[],\"IconMark\"]\n11:{\"metadata\":[[\"$\",\"link\",\"0\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"16x16\"}],[\"$\",\"$L18\",\"1\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"16:\"$11:metadata\"\n"])</script><script>self.__next_f.push([1,"19:T1778,"])</script><script>self.__next_f.push([1,"\n\u003cp\u003e\u003cem\u003eNo es magia. No es\u0026nbsp;suerte.\u0026nbsp;Es una combinación de habilidades sociales que podemos\u0026nbsp;\u003c/em\u003e\u003cstrong\u003e\u003cem\u003eaprender, entrenar y potenciar\u003c/em\u003e\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eDesde que nacemos, venimos programados para conectar.\u0026nbsp;La sociabilidad fue seleccionada evolutivamente al mejorar múltiples funciones adaptativas: protección, crianza cooperativa, aprendizaje social, acceso a recursos y regulación emocional a través del grupo.\u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eLo que antes garantizaba nuestra supervivencia física, hoy es también lo que sostiene nuestro bienestar emocional.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003e¿Qué son las habilidades sociales?\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eSon ese conjunto de comportamientos, emociones y pensamientos que usamos para interactuar con los demás de forma\u0026nbsp;\u003cstrong\u003erespetuosa, auténtica y eficaz\u003c/strong\u003e.\u0026nbsp;No nacemos con ellas: las\u0026nbsp;\u003cstrong\u003eaprendemos\u003c/strong\u003e. Y lo mejor es que\u0026nbsp;\u003cstrong\u003ese pueden entrenar a cualquier edad\u003c/strong\u003e.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eLas vamos adquiriendo:\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003ePor \u003cstrong\u003eobservación \u003c/strong\u003ede la interacción las personas que nos rodean —familia, amigos, profesores, figuras de referencia, incluso personajes de ficción—. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003ePor \u003cstrong\u003eensayo y error. \u003c/strong\u003eMucho de lo que sabemos hacer socialmente viene de probar y ver qué funciona. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003ePor la \u003cstrong\u003eretroalimentación de los demás. \u003c/strong\u003eLas reacciones de los demás moldean nuestros comportamientos. Un “me ayudó mucho cómo me escuchaste” refuerza la escucha activa. Una mala experiencia social puede llevar a evitar o a sobreprotegerse. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eY por nuestra forma de \u003cstrong\u003einterpretar\u003c/strong\u003e lo que ocurre. No respondemos solo a los hechos, sino a lo que \u003cstrong\u003ecreemos que significan\u003c/strong\u003e. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003eLas 7 habilidades que te hacen\u0026nbsp;\u003c/strong\u003e\u003cstrong\u003e\u003cem\u003esocialmente atractivo o atractiva:\u003c/em\u003e\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003col start=\"1\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eComunicación clara y coherente\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eHablas desde el “yo”, con emoción, sin rodeos ni ataques. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eTu tono, tu postura y tu mirada \u003cem\u003eacompañan lo que dices\u003c/em\u003e. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eEres capaz de decir lo que sientes sin herir. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eY lo más importante: \u003cstrong\u003esabes escuchar\u003c/strong\u003e (de verdad). \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003col start=\"2\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eEmpatía auténtica\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eCaptas lo que no se dice. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003ePercibes emociones, gestos, silencios. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eTe importa lo que le pasa al otro, y se nota. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eLa empatía es el \u003cem\u003ebálsamo natural de toda interacción humana\u003c/em\u003e. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003col start=\"3\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eAsertividad\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eDices lo que necesitas respetándote a ti, sin invadir a nadie. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eSabes poner límites, expresar desacuerdo y también pedir perdón. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eSer asertivo no es ser duro: es ser claro, firme y respetuoso. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003col start=\"4\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eConciencia emocional y autocontrol\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eTe conoces. Sabes qué te molesta y por qué. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eY en lugar de estallar… gestionas. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eSer consciente de tus emociones \u003cstrong\u003emejora la conexión con los demás\u003c/strong\u003e. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003col start=\"5\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eSincronía y adaptabilidad\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eTe “sintonizas” con el otro. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eTe adaptas al ritmo de la conversación, al tono emocional, al contexto. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eEsto crea \u003cstrong\u003erapport\u003c/strong\u003e: ese “sentirnos en la misma onda”. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003col start=\"6\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eRefuerzo social positivo\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eSabes elogiar sin adular. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eReconoces lo bueno en los demás y lo expresas. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eSabes recibir cumplidos sin minimizarlos. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eEres esa persona que \u003cem\u003elos demás recuerdan con una sonrisa\u003c/em\u003e. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003col start=\"7\" class=\"wp-block-list\"\u003e\n\u003cli\u003e\u003cstrong\u003eCuidado del vínculo\u003c/strong\u003e \u003c/li\u003e\n\u003c/ol\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eNo acumulas conflictos. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eBuscas entender y reparar. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eValoras la calidad por encima de la cantidad de relaciones. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eAportas seguridad y apoyo emocional. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cp\u003e\u003cstrong\u003e¿Y si no tengo estas habilidades?\u003c/strong\u003e\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cp\u003eLa buena noticia es esta:\u0026nbsp;\u003cstrong\u003eTODAS se pueden entrenar\u003c/strong\u003e.\u0026nbsp;Desde Emotiva te enseñamos cómo. Paso a paso, con prácticas reales, psicoeducación basada en evidencia, y herramientas para que las relaciones de tu vida dejen de ser fuente de estrés… y se conviertan en fuente de bienestar.\u0026nbsp;\u003c/p\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003ePorque conectar no es un lujo. Es una necesidad. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli\u003eY las habilidades sociales no solo mejoran tu entorno… mejoran tu salud, tu rendimiento, tu autoestima y tu felicidad. \u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cp\u003e\u003cem\u003ePorque sentir es el comienzo.\u003c/em\u003e\u0026nbsp;\u003cbr\u003e\u003cem\u003eY conectar, la clave\u003c/em\u003e\u0026nbsp;\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"d:[\"$\",\"div\",null,{\"className\":\"container mx-auto py-8 max-w-4xl\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"rounded-lg border bg-card text-card-foreground shadow-xl overflow-hidden\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"flex flex-col space-y-1.5 border-b p-0\",\"children\":[\"$undefined\",[\"$\",\"div\",null,{\"className\":\"p-6\",\"children\":[[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"tracking-tight text-3xl md:text-4xl font-bold text-primary\",\"dangerouslySetInnerHTML\":{\"__html\":\"¿POR QUÉ ALGUNAS PERSONAS SIMPLEMENTE… CAEN BIEN? \"}}],[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"flex flex-wrap items-center text-sm text-muted-foreground pt-2 gap-x-
