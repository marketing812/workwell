 puedes nombrar, puedes empezar a comprenderlo.\\nY lo que comprendes, puedes empezar a cuidarlo.\\nAprenderás a diferenciar lo que sientes de lo que piensas o haces, y a reconocer si esa emoción es una reacción inmediata (primaria) o si viene modulada por tus creencias o experiencias previas (secundaria).\\nEste primer paso es clave: no se trata de cambiar cómo te sientes, sino de mirarlo con claridad y sin culpa.\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio1Ruta6Sesion1.mp3\"},{\"type\":\"title\",\"text\":\"Psicoeducación\"},{\"type\":\"collapsible\",\"title\":\"¿Qué es una emoción?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/queesunaemocion.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"¿Sabías que la palabra emoción viene del latín emotĭo, que significa “movimiento hacia”? Las emociones, en esencia, nos mueven. Son como olas internas que se activan cuando algo del entorno toca algo importante dentro de nosotros.\\nUna emoción es una respuesta psicofisiológica compleja que se activa cuando vivimos una situación que tiene valor para nuestro bienestar, nuestros vínculos o nuestras metas. No es solo “sentirse de una forma”; es algo que pasa en todo el cuerpo: cambia cómo late el corazón, cómo respiramos, cómo enfocamos la atención y qué impulso tenemos para actuar. Por ejemplo: si alguien invade tu espacio personal, puedes sentir rabia, la mandíbula se tensa, el cuerpo se prepara para marcar un límite. Eso es una emoción en acción.\\nLas emociones no son errores del sistema. Son sistemas de alarma, orientación y energía.\\n¿Y para qué sirven?\\nLas emociones tienen funciones claras:\"},{\"type\":\"list\",\"items\":[\"Nos alertan de que algo importante está ocurriendo.\",\"Nos impulsan a actuar: protegernos, acercarnos, pedir ayuda, decir basta.\",\"Nos comunican con los demás, incluso antes de hablar.\",\"Nos conectan con nuestros valores y necesidades.\"]},{\"type\":\"paragraph\",\"text\":\"Sin emoción no hay dirección. Sin emoción, no habría movimiento. Por eso, aprender a reconocerlas no es un lujo: es una forma de cuidarnos.\"}]},{\"type\":\"collapsible\",\"title\":\"Emoción, pensamiento e impulso: ¿cómo se diferencian?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio2Ruta6Sesion1.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Cuando estamos muy activados emocionalmente, todo se mezcla: lo que sentimos, lo que pensamos, lo que queremos hacer. Pero entender la diferencia entre emoción, pensamiento e impulso es clave para poder autorregularnos.\\nVamos con un ejemplo:\\nImagina que alguien cercano no te devuelve una llamada importante.\"},{\"type\":\"list\",\"items\":[\"Pensamiento: “No le importo nada.”\",\"Emoción: tristeza… o quizás enfado.\",\"Impulso: escribir un mensaje duro… o desaparecer por completo.\"]},{\"type\":\"paragraph\",\"text\":\"La emoción es el sentir profundo.\\nEl pensamiento es la interpretación que haces.\\nEl impulso es lo que querrías hacer justo después.\\nMuchas veces, no podemos cambiar lo que sentimos… pero sí cómo pensamos sobre ello y qué hacemos con eso.\\nSeparar estos tres niveles es como desenredar una madeja. Nos da claridad, espacio interno y capacidad de elegir.\"}]},{\"type\":\"collapsible\",\"title\":\"¿Qué emoción estoy sintiendo realmente?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio3Ruta6Sesion1.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"A veces es evidente. Otras veces, no tanto. Podemos sentir varias emociones al mismo tiempo, incluso emociones opuestas. Por ejemplo:\"},{\"type\":\"list\",\"items\":[\"Alegría por una oportunidad nueva… y miedo por lo desconocido.\",\"Amor por alguien… y rabia por lo que ha hecho.\"]},{\"type\":\"paragraph\",\"text\":\"Reconocer esta mezcla no te hace contradictorio o contradictoria, te hace humano.\\nEmociones primarias: Son universales y aparecen de forma automática ante ciertas situaciones. Las más reconocidas son:\"},{\"type\":\"list\",\"items\":[\"Alegría\",\"Miedo\",\"Tristeza\",\"Ira\",\"Sorpresa\",\"Asco\"]},{\"type\":\"paragraph\",\"text\":\"Emociones secundarias: Son más complejas, están influenciadas por tu historia personal, tus creencias y tu contexto. Por ejemplo:\"},{\"type\":\"list\",\"items\":[\"Culpa\",\"Vergüenza\",\"Orgullo\",\"Resentimiento\",\"Ansiedad\"]},{\"type\":\"paragraph\",\"text\":\"A veces confundimos la emoción secundaria con la primaria. Por ejemplo, podemos reaccionar con rabia (secundaria), pero en el fondo hay tristeza (primaria) porque nos sentimos ignorados o heridas.\\nEl trabajo emocional empieza cuando nos preguntamos:\\n¿Qué estoy sintiendo realmente? ¿Y qué hay debajo?\"}]},{\"type\":\"collapsible\",\"title\":\"¿Por qué ponerle nombre a una emoción nos ayuda tanto?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio4Ruta6Sesion1.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Porque cuando lo haces, tu cerebro cambia. Literalmente.\\nSegún un estudio de Lieberman (2007), etiquetar con precisión una emoción activa zonas del córtex prefrontal, la parte del cerebro que nos ayuda a calmar, pensar y regular. Al mismo tiempo, disminuye la activación de la amígdala, la zona que reacciona con intensidad emocional.\\nEs decir, ponerle nombre a una emoción es como encender una luz en una habitación oscura: te orienta, te calma, te permite actuar con más claridad.\\nY algo aún más importante:\"},{\"type\":\"paragraph\",\"text\":\"No hay emociones buenas o malas.\\nHay emociones con una vivencia agradable (como la alegría o el amor) y otras con vivencia desagradable (como el miedo o la tristeza). Pero todas tienen una función. Todas informan. Todas merecen ser escuchadas.\\nSentirse mal no significa estar mal.\"},{\"type\":\"list\",\"items\":[\"La tristeza te dice que algo te importa.\",\"La rabia te señala que hubo un límite cruzado.\",\"La culpa puede recordarte un valor.\"]},{\"type\":\"paragraph\",\"text\":\"Como decía alguien:\\n“La emoción no es el problema. El problema es no saber qué hacer con ella.”\"}]},{\"type\":\"title\",\"text\":\"Técnicas Específicas\"},{\"type\":\"detectiveDeEmocionesExercise\",\"title\":\"EJERCICIO 1: DETECTIVE DE EMOCIONES\",\"objective\":\"¿Te pasa que todo se mezcla cuando te alteras y no sabes bien qué sientes? \\nEn esta práctica vas a convertirte en un/a detective de tus propias emociones: observar lo que pasó, lo que pensaste, cómo te sentiste y qué hiciste. \\nPaso a paso, vas a aprender a distinguir emoción, pensamiento e impulso, y así empezar a entenderte con más claridad y menos juicio. \\n\\nEsta técnica es para ti si a veces te cuesta parar, te dejas llevar por lo que sientes o simplemente no sabes qué te pasa exactamente. \\nTe prometo que cuando puedes ponerle nombre a lo que sientes, algo cambia dentro: te calmas, te escuchas y puedes responder con más conciencia. \\n\\nDuración estimada: 5–10 minutos. Te recomiendo realizar este ejercicio todos los dias de esta semana. \",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/tecnicas/Ruta6sesion1tecnica1.mp3\"},{\"type\":\"unaPalabraCadaDiaExercise\",\"title\":\"EJERCICIO 2: UNA PALABRA CADA DÍA\",\"objective\":\"Entrena el hábito de chequear cómo te sientes cada día con honestidad y respeto, creando una relación más amable contigo.\",\"duration\":\"2–3 min\"},{\"type\":\"therapeuticNotebookReflection\",\"title\":\"Reflexión Final de la Semana\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio7Ruta6Sesion1.mp3\",\"prompts\":[\"\u003cul\u003e\u003cli\u003e¿Qué he descubierto de mí esta semana al detenerme a sentir?\u003c/li\u003e\u003cli\u003e¿Qué emociones he “mirado a la cara” por primera vez, sin evitarlas?\u003c/li\u003e\u003cli\u003e¿Qué ha cambiado dentro de mí al observarlas en vez de pelear con ellas?\u003c/li\u003e\u003cli\u003e¿Hay alguna emoción que suelo juzgar o esconder y que esta vez he logrado nombrar con respeto?\u003c/li\u003e\u003cli\u003e¿Qué quiero seguir entrenando en mí a partir de ahora?\u003c/li\u003e\u003c/ul\u003e\"]},{\"type\":\"title\",\"text\":\"Resumen Clave\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio8Ruta6Sesion1.mp3\"},{\"type\":\"list\",\"items\":[\"Toda emoción tiene una función adaptativa, incluso si es incómoda.\",\"Distinguir entre emoción, pensamiento e impulso nos ayuda a responder con más conciencia.\",\"Podemos sentir varias emociones al mismo tiempo, incluso contradictorias.\",\"Nombrar una emoción con precisión reduce su intensidad y mejora la autorregulación.\",\"No hay emociones “buenas” o “malas”, sino emociones que nos informan y nos guían.\"]},{\"type\":\"quote\",\"text\":\"Cuando le pones nombre a lo que sientes, dejas de estar a oscuras contigo. Y empieza la claridad.\"}]},{\"id\":\"comp_sem2\",\"title\":\"Semana 2: Escuchar lo que hay detrás de cada emoción\",\"type\":\"skill_practice\",\"estimatedTime\":\"15-20 min\",\"content\":[{\"type\":\"paragraphWithAudio\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Introruta6Sesioon2.mp3\",\"text\":\"A veces sentimos tristeza, ansiedad, frustración… y tratamos de taparlas, ignorarlas o juzgarlas.\\nPero ¿qué pasaría si esas emociones fueran mensajes que traen necesidades?\\nEsta semana vas a practicar una forma distinta de escucharte: vas a conectar con lo que realmente necesitas cuando sientes una emoción intensa.\\nDescubrirás que tus emociones no son el problema. El verdadero malestar aparece cuando te desconectas de lo que necesitan expresar.\\nCon ayuda de la Comunicación No Violenta y ejercicios prácticos, empezarás a traducir tus emociones en cuidados. Porque cuando entiendes qué te duele, también puedes descubrir cómo sostenerte con más respeto.\"},{\"type\":\"title\",\"text\":\"Psicoeducación\"},{\"type\":\"collapsible\",\"title\":\"¿Y si tu emoción estuviera intentando ayudarte?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio2Ruta6Sesion2.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Las emociones no son errores del sistema. Son respuestas automáticas, complejas y profundamente humanas que surgen cuando algo significativo está ocurriendo. Aparecen para alertarte, protegerte o empujarte a actuar, aunque a veces lo hagan de forma incómoda o desconcertante.\\nLa neurociencia y la terapia cognitivo-conductual (TCC) han demostrado que lo que sentimos no depende solo de los hechos externos, sino también del significado subjetivo que les damos: nuestras experiencias previas, valores, creencias y, sobre todo, nuestras necesidades emocionales.\\nPor ejemplo: si una persona no responde tus mensajes, puedes sentir tristeza si necesitas conexión, o rabia si esperabas respeto. Lo que activa la emoción no es solo lo que pasa… sino lo que eso representa para ti.\\nCuando una necesidad interna —como sentirte valorado/a, segura/o o libre— se ve amenazada, la emoción aparece para ayudarte a mirar hacia dentro.\"}]},{\"type\":\"collapsible\",\"title\":\"Las emociones como señales de necesidades no cubiertas\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio3Ruta6Sesion2.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Desde el enfoque de la Comunicación No Violenta (CNV), toda emoción desagradable está ligada a una necesidad emocional insatisfecha.\\nNo estás siendo débil por sentir. Estás siendo honesta u honesto con lo que tu interior necesita.\\nEjemplos:\\n- Siento ira → Puede que necesite respeto, justicia o ser tenida en cuenta.\\n- Siento tristeza → Quizá necesito acompañamiento, descanso o expresar una pérdida.\\n- Siento ansiedad → Tal vez necesito claridad, estabilidad o contención.\\nReconocer esta relación te permite salir del juicio interno (“no debería sentir esto”) y entrar en una actitud de autocuidado:\\n“Mi emoción me está diciendo que algo me importa. ¿Qué está necesitando atención en mí?”\"}]},{\"type\":\"collapsible\",\"title\":\"¿Por qué duele tanto no escuchar lo que sentimos?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio4Ruta6Sesion2.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Cuando no entendemos lo que sentimos ni lo que necesitamos, es fácil caer en un bucle de malestar. Esto se conoce como desregulación emocional, y suele manifestarse así:\\n- Sientes con mucha intensidad, pero no sabes por qué.\\n- Te cuesta calmarte después de un pico emocional.\\n- Te juzgas por lo que sientes.\\n- Reaccionas sin entender lo que te ha activado.\\nLa TCC explica que los pensamientos automáticos (como “no puedo con esto” o “soy un desastre”) y los esquemas mentales disfuncionales (“si no lo hago perfecto, no valgo”) amplifican el sufrimiento. Estos pensamientos distorsionan la realidad y dificultan la conexión con lo que realmente necesitas.\\nAprender a distinguir entre emoción, pensamiento y necesidad no es solo una técnica psicológica. Es una forma de autocompasión activa.\"}]},{\"type\":\"collapsible\",\"title\":\"¿Por qué a veces siento tanto... y no entiendo por qué?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio5Ruta6Sesion2.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Tus emociones actuales no nacen en el vacío. Están moldeadas por tus vivencias anteriores, especialmente por la forma en que fueron acogidas tus emociones en la infancia o adolescencia.\\n- Si aprendiste que llorar era un signo de debilidad, hoy puedes bloquear la tristeza.\\n- Si te enseñaron que enojarse era peligroso, quizás reprimes la ira hasta que explota.\\n- Si creciste sin ser escuchada o escuchado, hoy tal vez te cueste identificar qué necesitas.\\nEstudios sobre el apego y el desarrollo emocional confirman que cuando nuestras necesidades no fueron vistas ni validadas de forma consistente, podemos desarrollar una gran dificultad para identificar, expresar y cuidar nuestras emociones.\\nPero eso no significa que estés condenada o condenado a repetir ese patrón.\\nLa buena noticia es que el cerebro es plástico (puede cambiar). Y el cuidado también se puede aprender en la adultez.\\nEscuchar lo que sientes ahora, con curiosidad y sin juicio, es el primer paso para sanar desde dentro.\"}]},{\"type\":\"title\",\"text\":\"Técnicas Específicas\"},{\"type\":\"mapaEmocionNecesidadCuidadoExercise\",\"title\":\"EJERCICIO 1: MAPA EMOCIÓN – NECESIDAD – CUIDADO\",\"objective\":\"Quiero ayudarte a hacer algo que muchas personas no saben cómo empezar: traducir una emoción en una necesidad, y luego, transformar esa necesidad en una acción real que te cuide. Este ejercicio es como encender una luz dentro de ti: vas a observar lo que te duele, y en lugar de taparlo, vas a preguntarte qué necesita atención. Así empieza la transformación. Duración estimada: 5-10 minutos. Te recomiendo hacerlo 3 o 4 veces esta semana. \",\"duration\":\"5–10 min\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/tecnicas/Ruta6semana2tecnica1.mp3\"},{\"type\":\"cartaDesdeLaEmocionExercise\",\"title\":\"EJERCICIO 2: CARTA DESDE LA EMOCIÓN\",\"objective\":\"A veces sentimos algo muy fuerte, pero no sabemos explicarlo. Es como si hubiera una parte dentro de nosotros gritando por atención… y no supiéramos cómo escucharla.\\n\\nEsta carta te invita a imaginar que tu emoción quiere hablar contigo, no para desbordarte, sino para ayudarte a entender qué está ocurriendo dentro de ti.\\n\\nVas a permitirle que se exprese sin juicio, con honestidad, como si fuera una voz interior que quiere cuidarte, no herirte.\\n\\nEste ejercicio puede ayudarte a desactivar el piloto automático emocional y a reconectar contigo desde la comprensión.\",\"duration\":\"10 min\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/tecnicas/Ruta6semana2tecnica2.mp3\"},{\"type\":\"therapeuticNotebookReflection\",\"title\":\"Reflexión Final de la Semana\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio8Ruta6Sesion2.mp3\",\"prompts\":[\"\u003cul\u003e\u003cli\u003e¿Qué emoción ha aparecido con más fuerza esta semana?\u003c/li\u003e\u003cli\u003e¿Qué crees que esa emoción intentaba proteger o señalar?\u003c/li\u003e\u003cli\u003e¿Qué aprendiste al traducir tus emociones en necesidades concretas?\u003c/li\u003e\u003cli\u003e¿Qué pequeño acto de cuidado has hecho (o te gustaría hacer) como respuesta a lo que sientes?\u003c/li\u003e\u003c/ul\u003e\"]},{\"type\":\"title\",\"text\":\"Resumen Clave\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio9Ruta6Sesion2.mp3\"},{\"type\":\"list\",\"items\":[\"Las emociones no son errores, son mensajes valiosos sobre lo que nos importa.\",\"Toda emoción desagradable suele señalar una necesidad emocional no cubierta.\",\"Ignorar lo que sentimos nos desregula; escucharlo nos organiza desde dentro.\",\"Aprender a traducir emociones en necesidades y acciones es un acto de autocompasión activa.\",\"Nuestras emociones presentes están teñidas por historias pasadas, pero podemos aprender a cuidarlas con nuevas respuestas.\"]},{\"type\":\"quote\",\"text\":\"Sentir no te debilita. Te revela lo que importa\"}]},{\"id\":\"comp_sem3\",\"title\":\"Semana 3: Detectar mis patrones emocionales\",\"type\":\"skill_practice\",\"estimatedTime\":\"20-25 min\",\"content\":[{\"type\":\"paragraphWithAudio\",\"text\":\"¿Notas que a veces reaccionas igual ante ciertas personas o situaciones, aunque sean distintas?\\n¿O que ciertas emociones se repiten una y otra vez?\\nEsta semana vas a mirar más de cerca tus patrones emocionales repetidos: esos botones que se activan una y otra vez, sin que siempre lo elijas.\\nCon ayuda de herramientas visuales y mapas emocionales, identificarás qué situaciones suelen activarte, qué emociones surgen y qué creencias hay detrás. También aprenderás a distinguir si están conectadas con antiguos esquemas emocionales no resueltos.\\nNo se trata de culparte por reaccionar así. Se trata de recuperar el poder de elegir cómo quieres responder.\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Introsemana3.mp3\"},{\"type\":\"title\",\"text\":\"Psicoeducación\"},{\"type\":\"collapsible\",\"title\":\"¿Por qué a veces reacciono “de más”?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio2Ruta6Sesion3.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"No todo lo que sentimos viene solo del presente.\\nA veces, una situación cotidiana activa una emoción muy intensa…\\nY no es que estés exagerando: puede que algo más profundo se haya activado.\\nDesde la Terapia de Esquemas sabemos que muchas personas llevan dentro creencias emocionales muy arraigadas:\\n“Me van a abandonar”, “Si fallo, no valgo”, “No puedo confiar en nadie”.\\nEstas creencias, llamadas esquemas emocionales, pueden dispararse sin que lo notes. Y cuando lo hacen, la reacción es fuerte… porque no estás reaccionando solamente a lo que pasa hoy, sino a lo que una parte de ti recuerda de antes.\"}]},{\"type\":\"collapsible\",\"title\":\"Tus botones emocionales\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio3Ruta6Sesion3.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Todos tenemos “botones emocionales”: temas que nos tocan con más fuerza.\\nTal vez te afecta más el rechazo, o sentir que no te tienen en cuenta, o que pierdes el control.\\nNo es casualidad: son puntos sensibles que se formaron con el tiempo.\\nEstos botones emocionales son como alarmas que se activan cuando algo “se parece” a lo que te dolió antes.\\nY como cualquier alarma, buscan protegerte… aunque a veces te dejen atrapado o atrapada en reacciones que ya no necesitas.\\nEntender cuáles son tus botones no te hace más vulnerable. Te da poder para anticiparlos y cuidarte mejor.\"}]},{\"type\":\"collapsible\",\"title\":\"El papel de los pensamientos\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio4Ruta6Sesion3.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"¿Y qué pasa con lo que pensamos cuando sentimos?\\nLas emociones no surgen directamente de lo que ocurre, sino de cómo lo interpretamos.\\nEn psicología lo explicamos así:\\nAcontecimiento → Creencia → Consecuencia emocional\\nPor ejemplo:\\n- Alguien no responde tu mensaje → “No le importo nada” → tristeza.\\n- Cometes un error → “Soy un fracaso” → culpa o rabia.\\n- Una mirada te incomoda → “Se están burlando de mí” → ansiedad o vergüenza.\\nEstos pensamientos aparecen automáticamente, sin que los elijas. Vienen de esquemas internos formados hace mucho… pero que aún hoy pueden moldear cómo sientes y cómo actúas.\"}]},{\"type\":\"collapsible\",\"title\":\"Las heridas que aún duelen\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio5Ruta6Sesion3.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Aquí es donde entran las heridas emocionales.\\nNo todas las heridas son visibles, ni vienen de un solo hecho traumático. A veces son el resultado de años sintiéndote poco valorado/a, exigido/a, ignorado/a o criticado/a.\\nEstas experiencias dejan huellas.\\nY esas huellas se transforman en creencias como:\\n“Tengo que esforzarme siempre para que me quieran”,\\n“Si muestro lo que siento, me van a rechazar”,\\n“No puedo fallar”.\\nCuando una herida se activa, la emoción es más intensa, el pensamiento más negativo… y la reacción más automática.\"}]},{\"type\":\"collapsible\",\"title\":\"¿Por qué repito siempre lo mismo?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio6Ruta6Sesion3.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Si sabes que algo te hace daño… ¿por qué sigues reaccionando igual?\\nNo es que no quieras cambiar. Es que hay razones profundas para esa repetición.\"},{\"type\":\"list\",\"items\":[\"El cerebro automatiza lo que se repite. Si llevas años reaccionando con tristeza o rabia, tu cerebro lo convierte en “ruta rápida”.\",\"Buscamos lo familiar, incluso si duele. Si creciste sintiéndote solo/a o exigido/a, es normal que tu cuerpo y mente vuelvan ahí sin querer.\",\"Evitamos lo incómodo. Tapamos emociones con distracción, exigencia o complacencia. Pero al evitar lo que duele, no lo sanamos… solo lo repetimos.\"]}]},{\"type\":\"collapsible\",\"title\":\"Cuando las emociones se sienten demasiado\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio7Ruta6Sesion3.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"¿Y por qué algunas emociones parecen tan grandes que nos arrastran?\"},{\"type\":\"list\",\"items\":[\"Porque tocan algo importante y personal.\u003cbr /\u003eUna crítica cualquiera no duele igual que una crítica que activa tu herida de desvalorización.\",\"Porque están teñidas de pensamientos distorsionados.\u003cbr /\u003eComo “todo o nada”, “esto siempre me pasa”, “no hay salida”.\",\"Porque reaccionamos antes de pensar.\u003cbr /\u003eEl cerebro emocional (amígdala) se activa antes de que lo racional entre en juego. Por eso a veces gritas o te cierras sin saber por qué.\",\"Porque el cuerpo también recuerda.\u003cbr /\u003eLa ansiedad se siente en el estómago, la tristeza en el pecho, la rabia en la mandíbula. Tu cuerpo guarda memoria emocional… y te avisa cuando algo no está bien.\"]}]},{\"type\":\"collapsible\",\"title\":\"Entonces, ¿qué puedo hacer?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio8Ruta6Sesion3.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"No se trata de dejar de sentir, sino de empezar a entenderte.\"},{\"type\":\"list\",\"items\":[\"Observarte sin juicio.\u003cbr /\u003eTodo lo que sientes tiene una razón. No lo censures: escúchalo.\",\"Nombrar lo que sientes.\u003cbr /\u003e“Estoy sintiendo tristeza”, “Estoy frustrado/a” → solo con eso, ya estás empezando a regular tu sistema emocional.\",\"Buscar el mensaje detrás.\u003cbr /\u003e¿Qué necesidad hay debajo de esta emoción? ¿Qué parte de mí necesita atención o cuidado?\",\"Interrumpir el piloto automático.\u003cbr /\u003eEsta semana aprenderás dos técnicas para hacerlo:\u003cbr /\u003eMapa emocional repetido\u003cbr /\u003eSemáforo emocional\u003cbr /\u003eAmbas te ayudarán a crear espacio antes de reaccionar… y a elegir desde la conciencia.\"]}]},{\"type\":\"title\",\"text\":\"Técnicas Específicas\"},{\"type\":\"mapaEmocionalRepetidoExercise\",\"title\":\"EJERCICIO 1: MAPA EMOCIONAL REPETIDO\",\"objective\":\"Este ejercicio es para ti si a veces sientes que reaccionas “de más” y no entiendes por qué. \\nVas a aprender a identificar esas situaciones que te remueven una y otra vez, reconocer qué emoción se activa y qué historia interna estás repitiendo sin darte cuenta. \\nAl hacer visible tu patrón emocional, podrás empezar a cuidarte de otra manera: con más comprensión, más claridad y más elección. \\nPorque lo que hoy te desborda… puede estar hablándote de algo que aún merece ser mirado con ternura. \\n\\nDuración estimada: 15–20 minutos. Te recomiendo repetir el ejercicio 3 o 4 veces por semana, idealmente después de una reacción emocional significativa. \",\"duration\":\"15–20 min\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/tecnicas/Ruta6semana3tecnica1.mp3\"},{\"type\":\"semaforoEmocionalExercise\",\"title\":\"EJERCICIO 2: SEMÁFORO EMOCIONAL INTERACTIVO\",\"objective\":\"Este ejercicio te ayudará a parar antes de que la emoción tome el control. Vas a entrenar la capacidad de saber en qué punto estás y qué puedes hacer para cuidarte en cada momento. Porque sí: puedes aprender a no reaccionar en automático y a regularte con presencia, con respeto por lo que sientes… y con pequeñas decisiones que lo cambian todo.\",\"duration\":\"5–10 minutos. Te recomiendo practicarlo 1 vez al día, o cada vez que sientas una activación emocional.\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/tecnicas/Ruta6semana3tecnica2.mp3\"},{\"type\":\"therapeuticNotebookReflection\",\"title\":\"Reflexión Final de la Semana\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio11Ruta6Sesion3.mp3\",\"prompts\":[\"\u003cul\u003e\u003cli\u003e¿Qué emoción se ha repetido más en mí últimamente?\u003c/li\u003e\u003cli\u003e¿En qué situaciones aparece? ¿Qué pensamientos suelen acompañarla?\u003c/li\u003e\u003cli\u003e¿Qué patrón emocional reconozco como más habitual?\u003c/li\u003e\u003cli\u003e¿Cuál fue el descubrimiento más importante al hacer mi mapa emocional?\u003c/li\u003e\u003cli\u003e¿Qué suele ocurrirme cuando una emoción me desborda?\u003c/li\u003e\u003cli\u003e¿Qué me gustaría empezar a hacer diferente cuando noto que un patrón se repite?\u003c/li\u003e\u003c/ul\u003e\"]},{\"type\":\"title\",\"text\":\"Resumen Clave\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio12Ruta6Sesion3.mp3\"},{\"type\":\"list\",\"items\":[\"Las emociones intensas no siempre tienen que ver solo con lo que está pasando, sino con lo que ya pasó y aún duele.\",\"Todos tenemos esquemas emocionales o heridas antiguas que, cuando se activan, generan reacciones automáticas.\",\"Detectar nuestros “botones emocionales” es el primer paso para dejar de vivir en piloto automático.\",\"El pensamiento moldea la emoción: lo que crees sobre lo que pasa influye mucho en cómo te sientes.\",\"Tu cuerpo también guarda memoria emocional. Aprender a escucharlo es una vía para regularte.\",\"Conectar con tu patrón emocional te da poder: el poder de responder diferente.\"]},{\"type\":\"quote\",\"text\":\"Lo que repites no dice quién eres. Lo que realmente te define es lo que eliges hacer cuando comprendes tu propio patrón.\"}]},{\"id\":\"comp_sem4\",\"title\":\"Semana 4: Habitarme con conciencia y sin juicio\",\"type\":\"summary\",\"estimatedTime\":\"20-25 min\",\"content\":[{\"type\":\"paragraphWithAudio\",\"text\":\"¿Y si no tuvieras que corregirte todo el tiempo?\\n¿Y si pudieras observar lo que sientes sin pelear contigo?\\n\\nEsta semana cerrarás la ruta cultivando una mirada interna más compasiva y consciente.\\nAprenderás a entrenar la autoconciencia plena: estar contigo con curiosidad, no con juicio.\\n\\nVerás cómo el mindfulness, la teoría polivagal y la metacognición pueden ayudarte a cultivar seguridad interna, observar sin reaccionar, y escucharte desde un lugar más amable.\\n\\nEste es uno de los mayores regalos que puedes darte: ser tu propio espacio seguro.\\nPorque cuando aprendes a habitarte con respeto, todo empieza a cambiar desde dentro.\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/semana4/INTRODUCCIONSEMANA4.mp3\"},{\"type\":\"title\",\"text\":\"Psicoeducación\"},{\"type\":\"collapsible\",\"title\":\"Habitarme con conciencia y sin juicio\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio1Ruta6Sesion4.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"¿Y si pudieras estar contigo, incluso cuando algo te duele… sin criticarte?\\n\\nEso es autoconciencia plena:\\nAprender a estar presente con lo que sientes, tal y como es.\\nSin lucha. Sin exigencias. Sin disfraz. Solo tú, aquí y ahora. \"}]},{\"type\":\"collapsible\",\"title\":\"¿Qué significa tener autoconciencia plena?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio3Ruta6Sesion4.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Significa darte cuenta de lo que estás pensando, sintiendo y haciendo…\\nen el momento en que ocurre.\\n\\nY hacerlo sin juzgarte, sin querer taparlo ni cambiarlo al instante.\\nNo se trata de perfección, sino de presencia y aceptación.\\nEs estar contigo de forma amable, instante a instante.\"}]},{\"type\":\"collapsible\",\"title\":\"¿De dónde viene este enfoque?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio4Ruta6Sesion4.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Este tipo de conciencia se basa en dos caminos terapéuticos:\\n\\nMindfulness: prestar atención al presente con amabilidad.\\n\\nACT (Terapia de Aceptación y Compromiso): tú no eres tus pensamientos o emociones…\\neres quien los observa.\\n\\nAprender esto te permite tomar distancia y elegir mejor.\"}]},{\"type\":\"collapsible\",\"title\":\"Observarte no es una debilidad\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio5Ruta6Sesion4.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Al contrario: es una fuerza emocional.\\nDecir “estoy notando ansiedad” no es lo mismo que decir “soy ansiosa”.\\n\\nEsa diferencia, aunque parezca pequeña, te da poder para decidir cómo actuar.\\nCuando dejas de identificarte con la emoción, dejas también de reaccionar en automático.\"}]},{\"type\":\"collapsible\",\"title\":\"Metacognición: el arte de observar tu mente\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio6Ruta6Sesion4.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"La metacognición es la habilidad de darte cuenta de lo que piensas o sientes… y observarlo desde fuera.\\n\\nEs como tener una linterna que te ayuda a ver con claridad lo que pasa dentro de ti.\\nY gracias a eso, puedes entender mejor tu reacción y elegir otra forma de responder.\\n\\nEs una herramienta clave para regularte, cuidarte y tomar buenas decisiones.\"}]},{\"type\":\"collapsible\",\"title\":\"Del juicio a la curiosidad\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio7Ruta6Sesion4.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Muchas veces nos decimos cosas como:\\n“No debería sentir esto”, “Estoy exagerando”, “Ya estamos otra vez…”\\n\\nPero hablarte así no ayuda a cambiar lo que sientes.\\nSolo lo hace más difícil.\\n\\nEn cambio, si te preguntas con amabilidad:\\n“¿Qué me está pasando en realidad?”\\nse abre un espacio de comprensión y calma dentro de ti.\"}]},{\"type\":\"collapsible\",\"title\":\"¿Qué cambia cuando me observo con curiosidad?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio8Ruta6Sesion4.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Empiezas a conocerte mejor.\\n\\nDejas de encasillarte con etiquetas (“soy débil”, “siempre fallo”).\\n\\nDescubres qué necesitas de verdad.\\n\\nReaccionas menos y eliges mejor.\\n\\nTratas con más empatía.\\n\\nNo tienes que cambiar lo que sientes.\\nSolo cambiar la manera en la que te acompañas cuando lo sientes.\"}]},{\"type\":\"collapsible\",\"title\":\"La curiosidad como medicina emocional\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio9Ruta6Sesion4.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Ejemplo práctico:\\n“No quiero estar ansiosa” → resistencia → más ansiedad\\n“Estoy sintiendo ansiedad… ¿qué necesita?” → espacio → más calma\\n\\nObservarte sin juicio no borra lo que sientes,\\npero sí lo contiene con amabilidad, y eso ya es transformador.\\n\\nNo necesitas tener todas las respuestas\\n\\nLo más importante es hacerte mejores preguntas.\\nEstas te ayudarán a escucharte sin agobiarte:\\n\\n¿Qué estoy sintiendo ahora mismo?\\n\\n¿Qué necesita esta emoción?\\n\\n¿Qué historia estoy contándome?\\n\\n¿Cómo puedo cuidarme un poco mejor ahora?\"}]},{\"type\":\"collapsible\",\"title\":\"¿Y si me cuesta observarme con calma?\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Audio10Ruta6Sesion4.mp3\",\"content\":[{\"type\":\"paragraph\",\"text\":\"Es totalmente normal.\\n\\nCuando tu cuerpo percibe una amenaza, no puede reflexionar.\\nSolo se activa para defenderse.\\n\\nEsto no es un fallo: es tu sistema nervioso intentando protegerte.\\nPor eso, para poder mirarte con serenidad, primero necesitas sentirte a salvo.\\n\\n¿Cómo funciona nuestro sistema nervioso? (Teoría Polivagal)\"},{\"type\":\"paragraph\",\"text\":\"Tu cuerpo cambia según cómo percibe el entorno:\"},{\"type\":\"list\",\"items\":[\"Estado de seguridad: calma, conexión, reflexión.\",\"Estado de alarma: lucha o huida.\",\"Estado de colapso: bloqueo o desconexión.\"]},{\"type\":\"paragraph\",\"text\":\"Cuando estás en seguridad, puedes observarte sin pelear contigo.\\nPor eso es tan importante cultivar ese estado interno.\\n\\nCómo generar seguridad dentro de ti\\n\\nAquí tienes pequeñas acciones que ayudan a tu sistema nervioso a sentirse a salvo:\"},{\"type\":\"list\",\"items\":[\"Respirar de forma consciente.\",\"Sentir tus pies firmes en el suelo.\",\"Hablarte con amabilidad.\",\"Rodearte de personas que te respetan.\",\"Recordarte: lo que sientes no es un error.\"]},{\"type\":\"paragraph\",\"text\":\"La seguridad no se impone. Se entrena poco a poco.\\n\\nEl poder de tu voz interior\\n\\nTu cuerpo escucha cómo te hablas.\\n\\nUna frase amable puede calmar tu corazón.\\n\\nUna crítica interna puede alterarte sin que te des cuenta.\\n\\nHabitarte con conciencia también es esto:\\ntratarte con respeto desde dentro, incluso cuando te equivocas.\"}]},{\"type\":\"collapsible\",\"title\":\"En resumen\",\"content\":[{\"type\":\"paragraph\",\"text\":\"La autoconciencia plena es el primer paso para cambiar de verdad.\\n\\nObservarte con curiosidad te transforma más que criticarte.\\n\\nTu sistema nervioso necesita seguridad para que puedas mirarte sin miedo. \\n\\nLa metacognición te ayuda a elegir mejor.\\n\\nNo tienes que corregirte. Solo aprender a acompañarte con respeto. Desde esa base… todo empieza a transformarse.\"}]},{\"type\":\"title\",\"text\":\"Técnicas Específicas\"},{\"type\":\"meditacionGuiadaSinJuicioExercise\",\"title\":\"EJERCICIO 1: MEDITACIÓN GUIADA SIN JUICIO\",\"objective\":\"Esta meditación te invita a dejar de luchar con lo que sientes y a practicar la aceptación: No como resignación, sino como una forma de cuidado profundo hacia ti.\\n\\nAl repetir la frase ancla — “Esto es lo que siento ahora… y está bien” — \\nempiezas a entrenar una voz interior más compasiva, que te acompaña sin exigencias, incluso en los momentos difíciles.\",\"duration\":\"Duración recomendada: 5-7 minutos por sesión. Te recomiendo practicarla entre 3 y 5 veces a la semana para fortalecer la autocompasión y la regulación emocional.\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/R6sem4ej1meditacion.mp3\",\"descriptionAudioUrl\":\"https://workwellfut.com/audios/ruta6/tecnicas/Ruta6semana4tecnica1.mp3\"},{\"type\":\"diarioMeDiCuentaExercise\",\"title\":\"EJERCICIO 2: DIARIO DEL “ME DI CUENTA”\",\"objective\":\"Entrena tu autoconciencia registrando pequeños descubrimientos sobre ti, para escucharte con más presencia y claridad.\",\"duration\":\"5–10 min\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/tecnicas/Ruta6semana4tecnica2.mp3\"},{\"type\":\"therapeuticNotebookReflection\",\"title\":\"Reflexión Final de la Semana\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Reflexionruta6Sesion4.mp3\",\"prompts\":[\"\u003cul\u003e\u003cli\u003e¿Qué descubrí sobre mí esta semana que antes pasaba desapercibido?\u003c/li\u003e\u003cli\u003e¿En qué momentos de esta semana lograste observar lo que sentías sin juzgarte?  (Ej. “Cuando sentí tristeza y no intenté esconderla… solo respiré con ella.”)\u003c/li\u003e\u003cli\u003e¿Qué descubriste sobre ti cuando soltaste la necesidad de “arreglarte”?  (Ej. “Que no soy débil por sentir… solo necesitaba descanso.”)\u003c/li\u003e\u003cli\u003e¿Qué emociones o patrones lograste nombrar o detectar con más claridad?  (Ej. “Identifiqué que detrás de mi irritabilidad había miedo a no ser suficiente.”)\u003c/li\u003e\u003cli\u003e¿Qué herramientas de esta semana te gustaría seguir practicando? ¿Por qué?  (Ej. “La frase ancla me ayudó a calmarme en medio del caos. Me dio paz.”)\u003c/li\u003e\u003c/ul\u003e\",\"\u003cp\u003eRecuerda: no estás aquí para ser perfecta o perfecto, sino para aprender a habitarte con más respeto.\u003c/p\u003e\"]},{\"type\":\"title\",\"text\":\"Resumen Clave\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Resumenruta6Sesion4.mp3\"},{\"type\":\"list\",\"items\":[\"La autoconciencia plena es la habilidad de estar presente contigo, sin juicio ni exigencias.\",\"Observar tus emociones no es debilidad. Es un acto de fuerza emocional y cuidado.\",\"La curiosidad transforma más que el juicio. Abre espacio y calma.\",\"Para observarte sin reaccionar, necesitas seguridad interna (teoría polivagal).\",\"La metacognición te permite detectar tus procesos mentales y elegir tu respuesta.\",\"Hablarte con amabilidad, anclarte al cuerpo y escribir lo que descubres… fortalece tu regulación emocional.\"]},{\"type\":\"quote\",\"text\":\"No necesitas arreglarte. Solo aprender a estar contigo con honestidad, sin juicio y con presencia. Desde ahí, todo empieza a transformarse.\"}]},{\"id\":\"comp_cierre\",\"title\":\"Cierre de la Ruta: Integración y Próximos Pasos\",\"type\":\"summary\",\"estimatedTime\":\"10-15 min\",\"content\":[{\"type\":\"therapeuticNotebookReflection\",\"title\":\"REFLEXIÓN FINAL DE LA RUTA\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Reflexionfinalruta6.mp3\",\"prompts\":[\"\u003cp\u003eQuizás en el camino aparecieron emociones incómodas o revelaciones inesperadas. Pero cada paso ha sido un acto de cuidado, una forma de decirte: “Estoy aquí para mí”.\u003c/p\u003e\",\"\u003cul\u003e\u003cli\u003e¿Qué he aprendido sobre mí que antes no veía con claridad?\u003c/li\u003e\u003cli\u003e¿Qué emociones o patrones he comenzado a entender mejor?\u003c/li\u003e\u003cli\u003e¿Cómo ha cambiado la forma en que me hablo y me observo?\u003c/li\u003e\u003cli\u003e¿Qué necesito recordarme cuando empiece a juzgarme o a querer controlarlo todo?\u003c/li\u003e\u003cli\u003e¿Qué frase me llevo como ancla de esta ruta para seguir habitándome con presencia?\u003c/li\u003e\u003c/ul\u003e\"]},{\"type\":\"title\",\"text\":\"RESUMEN FINAL DE LA RUTA\",\"audioUrl\":\"https://workwellfut.com/audios/ruta6/descripciones/Resumenfinalruta6.mp3\"},{\"type\":\"list\",\"items\":[\"Nombrar lo que sientes te ayuda a comprenderte y a regularte.\",\"Toda emoción encierra una necesidad que merece atención.\",\"Tus patrones emocionales repetidos no son errores: son puertas a tu historia.\",\"La autoconciencia no es autoexigencia, es presencia sin juicio.\",\"Observarte con curiosidad abre espacio para elegir, no solo reaccionar.\",\"No eres lo que sientes ni lo que piensas: eres quien observa.\",\"El juicio interno alimenta el malestar; la compasión lo transforma.\",\"La seguridad interna es la base para poder mirarte sin miedo.\",\"Tu sistema nervioso necesita cuidado, no presión.\",\"La metacognición te permite salir del piloto automático y actuar con conciencia.\",\"Escribir y registrar lo que descubres te ayuda a integrar y sanar.\",\"Comprenderte mejor no es llegar a un destino, sino acompañarte cada día con más verdad.\"]},{\"type\":\"quote\",\"text\":\"Cada vez que me observo con presencia y sin juicio, doy un paso hacia mi versión más consciente, más libre... y más compasiva.\"}]}]}}]\n"])</script><script>self.__next_f.push([1,"14:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1, viewport-fit=cover\"}]]\n10:null\n"])</script><script>self.__next_f.push([1,"1a:I[80622,[],\"IconMark\"]\n12:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Comprenderme Mejor Cada Día\"}],[\"$\",\"link\",\"1\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"16x16\"}],[\"$\",\"$L1a\",\"2\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"17:\"$12:metadata\"\n"])</script></body></html>
